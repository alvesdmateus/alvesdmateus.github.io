<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 480" width="260" height="480">
  <defs>
    <linearGradient id="la-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1235"/>
      <stop offset="100%" stop-color="#0f0c1f"/>
    </linearGradient>
    <linearGradient id="la-btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="260" height="480" fill="url(#la-bg)"/>

  <!-- Status bar -->
  <text x="20" y="24" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)" font-weight="600">9:41</text>
  <text x="220" y="24" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="end">●●●</text>

  <!-- Header -->
  <text x="20" y="56" font-family="system-ui" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">Language App</text>
  <!-- ELO badge -->
  <rect x="170" y="44" width="70" height="18" rx="9" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="205" y="57" font-family="system-ui" font-size="9" fill="#a78bfa" text-anchor="middle" font-weight="600">ELO 1 420</text>

  <!-- Daily streak card -->
  <rect x="20" y="68" width="220" height="52" rx="10" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="32" y="86" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">🔥 Daily Streak</text>
  <text x="32" y="106" font-family="system-ui" font-size="22" font-weight="800" fill="white">14 days</text>
  <text x="185" y="102" font-family="system-ui" font-size="28" fill="rgba(255,255,255,0.1)" text-anchor="middle">🗓</text>

  <!-- Language flags row -->
  <text x="20" y="142" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">LANGUAGES</text>
  <g font-family="system-ui" font-size="20" text-anchor="middle">
    <text x="38" y="168">🇧🇷</text>
    <text x="72" y="168">🇪🇸</text>
    <text x="106" y="168">🇺🇸</text>
    <text x="140" y="168">🇮🇹</text>
    <text x="174" y="168">🇫🇷</text>
    <text x="208" y="168">🇩🇪</text>
    <text x="242" y="168">🇯🇵</text>
  </g>
  <!-- Active indicator -->
  <rect x="28" y="172" width="20" height="2" rx="1" fill="#6366f1"/>

  <!-- Battle mode card -->
  <rect x="20" y="186" width="220" height="72" rx="10" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="32" y="205" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">⚡ Battle Mode</text>
  <text x="32" y="222" font-family="system-ui" font-size="13" font-weight="700" fill="white">5 questions · 45s each</text>
  <text x="32" y="238" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.35)">ELO-based difficulty · Real-time</text>
  <!-- Play button -->
  <rect x="182" y="200" width="46" height="22" rx="5" fill="rgba(239,68,68,0.7)"/>
  <text x="205" y="215" font-family="system-ui" font-size="11" fill="white" text-anchor="middle" font-weight="600">▶ Play</text>

  <!-- Ranked / Casual row -->
  <rect x="20" y="270" width="104" height="52" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="72" y="290" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">🏆 Ranked</text>
  <text x="72" y="308" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Gold II</text>

  <rect x="136" y="270" width="104" height="52" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="188" y="290" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">☁ Casual</text>
  <text x="188" y="308" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">Practice</text>

  <!-- Flashcard preview -->
  <rect x="20" y="334" width="220" height="72" rx="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="32" y="352" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.4)">Today's Flashcard</text>
  <text x="130" y="380" font-family="system-ui" font-size="20" font-weight="800" fill="white" text-anchor="middle">Bienvenido</text>
  <text x="130" y="396" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">tap to reveal translation</text>

  <!-- Bottom nav -->
  <rect y="452" width="260" height="28" fill="rgba(0,0,0,0.4)"/>
  <text x="40" y="472" font-family="system-ui" font-size="13" fill="#6366f1" text-anchor="middle">⌂</text>
  <text x="100" y="472" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">📖</text>
  <text x="160" y="472" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">⚔</text>
  <text x="220" y="472" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">👤</text>
  <!-- Active indicator -->
  <rect x="24" y="452" width="32" height="2" rx="1" fill="#6366f1"/>
</svg>
