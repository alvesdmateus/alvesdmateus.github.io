<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 480" width="260" height="480">
  <defs>
    <linearGradient id="tcg-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="tcg-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="260" height="480" fill="url(#tcg-bg)"/>

  <!-- Status bar -->
  <text x="20" y="24" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)" font-weight="600">9:41</text>
  <text x="220" y="24" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="end">●●●</text>

  <!-- Header -->
  <text x="20" y="56" font-family="system-ui" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)">TCG Manager</text>
  <!-- Card count badge -->
  <rect x="162" y="44" width="78" height="18" rx="9" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
  <text x="201" y="57" font-family="system-ui" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="600">1 284 cards</text>

  <!-- Collection value card -->
  <rect x="20" y="68" width="220" height="52" rx="10" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="32" y="86" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">💰 Collection Value</text>
  <text x="32" y="106" font-family="system-ui" font-size="22" font-weight="800" fill="white">$2,847</text>
  <text x="208" y="96" font-family="system-ui" font-size="9" fill="#4ade80" text-anchor="middle" font-weight="600">▲ 12%</text>

  <!-- TCG tabs -->
  <text x="20" y="142" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">GAMES</text>
  <g font-family="system-ui" font-size="10" font-weight="600">
    <rect x="20" y="150" width="56" height="22" rx="11" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
    <text x="48" y="165" fill="#fbbf24" text-anchor="middle">Pokémon</text>
    <rect x="84" y="150" width="44" height="22" rx="11" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="106" y="165" fill="rgba(255,255,255,0.5)" text-anchor="middle">MTG</text>
    <rect x="136" y="150" width="52" height="22" rx="11" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="162" y="165" fill="rgba(255,255,255,0.5)" text-anchor="middle">Yu-Gi-Oh</text>
    <rect x="196" y="150" width="44" height="22" rx="11" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="218" y="165" fill="rgba(255,255,255,0.5)" text-anchor="middle">More</text>
  </g>

  <!-- Card grid (3 card thumbnails) -->
  <rect x="20" y="186" width="68" height="92" rx="6" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="54" y="228" font-family="system-ui" font-size="24" text-anchor="middle">🔵</text>
  <text x="54" y="256" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">Blastoise</text>
  <text x="54" y="268" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">Holo · NM</text>

  <rect x="96" y="186" width="68" height="92" rx="6" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="130" y="228" font-family="system-ui" font-size="24" text-anchor="middle">🔴</text>
  <text x="130" y="256" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">Charizard</text>
  <text x="130" y="268" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">Ultra Rare · M</text>

  <rect x="172" y="186" width="68" height="92" rx="6" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="206" y="228" font-family="system-ui" font-size="24" text-anchor="middle">🟢</text>
  <text x="206" y="256" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">Venusaur</text>
  <text x="206" y="268" font-family="system-ui" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">Rare · NM</text>

  <!-- Stats row -->
  <rect x="20" y="290" width="104" height="52" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="72" y="310" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">📦 Sets</text>
  <text x="72" y="328" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">24 / 152</text>

  <rect x="136" y="290" width="104" height="52" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="188" y="310" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">⭐ Wishlist</text>
  <text x="188" y="328" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">18 cards</text>

  <!-- Recent activity -->
  <rect x="20" y="354" width="220" height="72" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="32" y="372" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.4)">Recent Activity</text>
  <text x="32" y="392" font-family="system-ui" font-size="11" font-weight="600" fill="white">+ Pikachu VMAX (Secret)</text>
  <text x="32" y="406" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.35)">Added 2h ago · Crown Zenith</text>
  <text x="32" y="418" font-family="system-ui" font-size="9" fill="#4ade80">Est. value: $34.50</text>

  <!-- Bottom nav -->
  <rect y="452" width="260" height="28" fill="rgba(0,0,0,0.4)"/>
  <text x="40" y="472" font-family="system-ui" font-size="13" fill="#f59e0b" text-anchor="middle">⌂</text>
  <text x="100" y="472" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">🔍</text>
  <text x="160" y="472" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">📊</text>
  <text x="220" y="472" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">👤</text>
  <!-- Active indicator -->
  <rect x="24" y="452" width="32" height="2" rx="1" fill="#f59e0b"/>
</svg>
