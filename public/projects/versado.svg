<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 561" width="260" height="561">
  <defs>
    <linearGradient id="vd-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f9ff"/>
      <stop offset="100%" stop-color="#eef0fb"/>
    </linearGradient>
    <linearGradient id="vd-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="vd-card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="260" height="561" fill="url(#vd-bg)"/>

  <!-- Status bar -->
  <text x="20" y="24" font-family="system-ui" font-size="11" fill="#94a3b8" font-weight="600">9:41</text>

  <!-- Header -->
  <text x="20" y="54" font-family="system-ui" font-size="18" font-weight="800" fill="#1e1b4b" letter-spacing="-0.5">Versado</text>
  <rect x="204" y="42" width="36" height="18" rx="9" fill="rgba(79,70,229,0.12)"/>
  <text x="222" y="55" font-family="system-ui" font-size="9" fill="#4f46e5" text-anchor="middle" font-weight="700">PRO</text>

  <!-- Greeting + streak -->
  <text x="20" y="74" font-family="system-ui" font-size="11" fill="#64748b">Good morning, Mateus 👋</text>
  <rect x="160" y="64" width="80" height="16" rx="8" fill="rgba(249,115,22,0.1)"/>
  <text x="200" y="75" font-family="system-ui" font-size="9" fill="#f97316" text-anchor="middle" font-weight="700">🔥 7-day streak</text>

  <!-- Daily goal bar -->
  <rect x="20" y="86" width="220" height="32" rx="8" fill="white" style="filter: drop-shadow(0 1px 3px rgba(0,0,0,0.06))"/>
  <text x="30" y="99" font-family="system-ui" font-size="9" fill="#64748b">Daily goal</text>
  <text x="230" y="99" font-family="system-ui" font-size="9" fill="#4f46e5" text-anchor="end" font-weight="700">14 / 20</text>
  <rect x="30" y="104" width="200" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="30" y="104" width="140" height="6" rx="3" fill="url(#vd-card)"/>

  <!-- Section label -->
  <text x="20" y="155" font-family="system-ui" font-size="10" fill="#94a3b8" letter-spacing="1" font-weight="600">MY DECKS</text>

  <!-- Deck card 1 — active, indigo -->
  <rect x="20" y="165" width="220" height="72" rx="12" fill="url(#vd-card)"/>
  <circle cx="210" cy="170" r="32" fill="rgba(255,255,255,0.08)"/>
  <circle cx="235" cy="190" r="24" fill="rgba(255,255,255,0.06)"/>
  <text x="32" y="187" font-family="system-ui" font-size="13" font-weight="800" fill="white">Spanish — Intermediate</text>
  <text x="32" y="203" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.65)">124 cards  ·  42 due today</text>
  <rect x="32" y="211" width="60" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
  <text x="62" y="222" font-family="system-ui" font-size="8" fill="white" text-anchor="middle" font-weight="600">68% mastered</text>
  <text x="224" y="205" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="end">›</text>

  <!-- Deck card 2 — teal -->
  <rect x="20" y="249" width="220" height="62" rx="12" fill="url(#vd-card2)"/>
  <circle cx="220" cy="255" r="28" fill="rgba(255,255,255,0.07)"/>
  <text x="32" y="271" font-family="system-ui" font-size="13" font-weight="800" fill="white">Astrophysics — Basics</text>
  <text x="32" y="286" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.65)">72 cards  ·  9 due today</text>
  <text x="224" y="280" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="end">›</text>

  <!-- Deck card 3 — light -->
  <rect x="20" y="323" width="220" height="62" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="32" y="345" font-family="system-ui" font-size="13" font-weight="800" fill="#1e1b4b">Marketplace</text>
  <text x="32" y="360" font-family="system-ui" font-size="10" fill="#94a3b8">Browse 200+ community decks</text>
  <rect x="186" y="337" width="42" height="18" rx="6" fill="rgba(79,70,229,0.1)"/>
  <text x="207" y="350" font-family="system-ui" font-size="9" fill="#4f46e5" text-anchor="middle" font-weight="600">Browse</text>

  <!-- Fluent mode CTA -->
  <rect x="20" y="402" width="220" height="44" rx="10" fill="url(#vd-card)"/>
  <text x="130" y="430" font-family="system-ui" font-size="13" font-weight="700" fill="white" text-anchor="middle">⚡ Start Fluent Session</text>

  <!-- Bottom nav -->
  <rect y="521" width="260" height="40" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <g font-family="system-ui" font-size="18" text-anchor="middle">
    <text x="32" y="547" fill="#4f46e5">⊞</text>
    <text x="88" y="547" fill="#94a3b8">🔍</text>
    <text x="130" y="547" fill="#94a3b8">🛒</text>
    <text x="176" y="547" fill="#94a3b8">📊</text>
    <text x="228" y="547" fill="#94a3b8">👤</text>
  </g>
  <!-- Active nav dot -->
  <rect x="20" y="521" width="24" height="2" rx="1" fill="#4f46e5"/>
</svg>
